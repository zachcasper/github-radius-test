# Radius deployment workflow
# Generated by rad init - do not edit manually
#
# CUSTOMIZATION GUIDE:
#
# This workflow is dispatched by 'rad deploy <bicep-file> --environment <env>'.
#
# It deploys the specified Bicep application to the target environment.
#
# 
#
# To trigger on push instead of workflow_dispatch, replace the 'on' section with:
#
#   on:
#
#     push:
#
#       branches: [main]
#
#       paths: ['.radius/applications/**']
#
# 
#
# GitHub Secrets are available in steps via ${{ secrets.SECRET_NAME }}

name: Radius deploy
run-name: Radius deploy for ${{ inputs.bicep_file }} in ${{ inputs.environment }} environment
"on":
    workflow_dispatch:
        inputs:
            bicep_file:
                description: Path to the Bicep file to deploy (relative to repository root)
                required: true
                type: string
            commit:
                description: Git commit hash for traceability
                required: true
                type: string
            environment:
                description: Target GitHub Environment name
                required: true
                type: string
permissions:
    actions: read
    contents: read
    id-token: write
concurrency:
    group: radius-deploy-${{ inputs.environment }}
jobs:
    deploy:
        name: Deploy Application
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        steps:
            - name: Checkout Radius source
              uses: actions/checkout@v4
              with:
                path: radius-src
                ref: ${{ vars.RADIUS_REF || 'main' }}
                repository: ${{ vars.RADIUS_REPO || 'radius-project/radius' }}
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                cache: "true"
                go-version-file: radius-src/go.mod
            - name: Build Radius CLI
              run: cd radius-src && go build -o /usr/local/bin/rad ./cmd/rad
            - name: Checkout application repository
              uses: actions/checkout@v4
              with:
                path: app
                ref: ${{ inputs.commit }}
            - name: Clone config repository
              run: |-
                # D070: Validate RADIUS_CONFIG_REPO is set, use default if empty
                if [ -z "$RADIUS_CONFIG_REPO" ]; then
                  echo "RADIUS_CONFIG_REPO not configured, using default: radius-project/resource-types-contrib"
                  RADIUS_CONFIG_REPO="https://github.com/radius-project/resource-types-contrib/tree/main"
                fi

                # Parse RADIUS_CONFIG_REPO URL (format: https://github.com/<owner>/<repo>/tree/<branch>)
                REPO_PATH=$(echo "$RADIUS_CONFIG_REPO" | sed 's|https://github.com/||' | sed 's|/tree/.*||')
                BRANCH=$(echo "$RADIUS_CONFIG_REPO" | sed 's|.*/tree/||')

                rm -rf resource-types && git clone --depth 1 --branch "$BRANCH" "https://github.com/${REPO_PATH}.git" resource-types

                # Copy bicepconfig.json and Bicep extension archives to app directory
                # so rad deploy can resolve Bicep extensions (Bicep searches parent dirs from .bicep file)
                cp resource-types/config/bicepconfig.json app/
                cp resource-types/config/*.tgz app/
              env:
                RADIUS_CONFIG_REPO: ${{ vars.RADIUS_CONFIG_REPO }}
            - name: Install yq
              run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq
            - name: Install k3d
              run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
            - name: Create k3d cluster
              run: k3d cluster create radius-ephemeral --volume $GITHUB_WORKSPACE/app:/github_workspace
            - name: Export kubeconfig
              run: k3d kubeconfig get radius-ephemeral > /tmp/kubeconfig.yaml
            - name: Azure Login (target cluster)
              uses: azure/login@v2
              with:
                client-id: ${{ vars.AZURE_CLIENT_ID }}
                subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
                tenant-id: ${{ vars.AZURE_TENANT_ID }}
              if: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.KUBERNETES_CLUSTER != '' }}
            - name: Configure AWS credentials (target cluster)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-region: ${{ vars.AWS_REGION }}
                role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_IAM_ROLE_NAME }}
              if: ${{ vars.AWS_ACCOUNT_ID != '' && vars.KUBERNETES_CLUSTER != '' }}
            - name: Fetch target cluster credentials
              run: |-
                TARGET_KUBECONFIG="/tmp/target-kubeconfig.yaml"
                if [ -z "$KUBERNETES_CLUSTER" ]; then
                  echo "No KUBERNETES_CLUSTER configured, resources will deploy to local k3d cluster"
                  exit 0
                fi

                # Infer cloud provider from environment variables
                if [ -n "$AZURE_SUBSCRIPTION_ID" ] && [ -n "$AWS_ACCOUNT_ID" ]; then
                  echo "ERROR: Both AZURE_SUBSCRIPTION_ID and AWS_ACCOUNT_ID are set. Only one cloud provider is supported."
                  exit 1
                elif [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
                  PROVIDER="azure"
                elif [ -n "$AWS_ACCOUNT_ID" ]; then
                  PROVIDER="aws"
                else
                  echo "ERROR: KUBERNETES_CLUSTER is set but neither AZURE_SUBSCRIPTION_ID nor AWS_ACCOUNT_ID is configured."
                  exit 1
                fi

                echo "Fetching credentials for target cluster: $KUBERNETES_CLUSTER (provider: $PROVIDER)"

                if [ "$PROVIDER" = "azure" ]; then
                  az aks get-credentials \
                    --resource-group "$AZURE_RESOURCE_GROUP" \
                    --name "$KUBERNETES_CLUSTER" \
                    --file "$TARGET_KUBECONFIG" \
                    --overwrite-existing
                elif [ "$PROVIDER" = "aws" ]; then
                  aws eks update-kubeconfig \
                    --name "$KUBERNETES_CLUSTER" \
                    --region "$AWS_REGION" \
                    --kubeconfig "$TARGET_KUBECONFIG"
                fi

                echo "Target cluster kubeconfig saved to $TARGET_KUBECONFIG"
                kubectl --kubeconfig "$TARGET_KUBECONFIG" cluster-info || {
                  echo "ERROR: Cannot connect to target cluster"
                  exit 1
                }
              env:
                AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                AWS_REGION: ${{ vars.AWS_REGION }}
                AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
                AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
                KUBERNETES_CLUSTER: ${{ vars.KUBERNETES_CLUSTER }}
            - name: Install Radius control plane
              run: rad install kubernetes --skip-contour-install --set dashboard.enabled=false ${RADIUS_IMAGE_REGISTRY:+--set global.imageRegistry=$RADIUS_IMAGE_REGISTRY} ${RADIUS_IMAGE_TAG:+--set global.imageTag=$RADIUS_IMAGE_TAG}
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
                RADIUS_IMAGE_REGISTRY: ${{ vars.RADIUS_IMAGE_REGISTRY }}
                RADIUS_IMAGE_TAG: ${{ vars.RADIUS_IMAGE_TAG }}
            - name: Wait for deployment engine
              run: |-
                echo "Waiting for deployment engine to be ready..."
                kubectl wait --for=condition=available deployment/bicep-de -n radius-system --timeout=120s || {
                  echo "Warning: Deployment engine pod not available, continuing anyway..."
                }
                echo "Waiting for Microsoft.Resources/deployments resource type to be registered..."
                for i in $(seq 1 30); do
                  if rad resource-type show "Microsoft.Resources/deployments" 2>/dev/null | grep -q "Microsoft.Resources/deployments"; then
                    echo "Deployment engine resource type is registered."
                    break
                  fi
                  echo "Waiting for deployment engine registration... ($i/30)"
                  sleep 4
                done
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Configure external deployment target
              run: |-
                TARGET_KUBECONFIG="/tmp/target-kubeconfig.yaml"
                echo "=== Configure External Deployment Target ==="
                echo "Checking for target kubeconfig at: $TARGET_KUBECONFIG"

                if [ ! -f "$TARGET_KUBECONFIG" ]; then
                  echo "INFO: No target kubeconfig found at $TARGET_KUBECONFIG"
                  echo "INFO: Resources will deploy to local k3d cluster (default behavior)"
                  exit 0
                fi

                echo "Target kubeconfig file found ($(wc -c < "$TARGET_KUBECONFIG") bytes)"
                echo "Target cluster info:"
                kubectl --kubeconfig "$TARGET_KUBECONFIG" cluster-info 2>&1 || echo "WARNING: Could not get target cluster info"

                echo ""
                echo "--- Step 1: Creating target-kubeconfig secret in radius-system namespace ---"
                kubectl create secret generic target-kubeconfig \
                  --namespace radius-system \
                  --from-file=config="$TARGET_KUBECONFIG"
                echo "Secret created successfully"
                kubectl get secret target-kubeconfig -n radius-system -o jsonpath='{.metadata.name}' && echo " exists"

                echo ""
                echo "--- Step 2: Current state of Radius deployments ---"
                echo "applications-rp pods:"
                kubectl get pods -n radius-system -l app.kubernetes.io/name=applications-rp -o wide 2>&1
                echo "dynamic-rp pods:"
                kubectl get pods -n radius-system -l app.kubernetes.io/name=dynamic-rp -o wide 2>&1
                echo "bicep-de pods:"
                kubectl get pods -n radius-system -l app.kubernetes.io/name=bicep-de -o wide 2>&1

                PATCH_APPLICATIONS_RP='[
                  {
                    "op": "add",
                    "path": "/spec/template/spec/volumes/-",
                    "value": {
                      "name": "target-kubeconfig",
                      "secret": {
                        "secretName": "target-kubeconfig"
                      }
                    }
                  },
                  {
                    "op": "add",
                    "path": "/spec/template/spec/containers/0/volumeMounts/-",
                    "value": {
                      "name": "target-kubeconfig",
                      "mountPath": "/etc/radius/target-kubeconfig",
                      "readOnly": true
                    }
                  },
                  {
                    "op": "add",
                    "path": "/spec/template/spec/containers/0/env/-",
                    "value": {
                      "name": "RADIUS_TARGET_KUBECONFIG",
                      "value": "/etc/radius/target-kubeconfig/config"
                    }
                  }
                ]'

                # dynamic-rp also gets KUBE_CONFIG_PATH — the native Terraform kubernetes provider env var.
                # This ensures Terraform recipes deploy to the target cluster even if the dynamic-rp image
                # does not include the RADIUS_TARGET_KUBECONFIG code change in BuildConfig().
                PATCH_DYNAMIC_RP='[
                  {
                    "op": "add",
                    "path": "/spec/template/spec/volumes/-",
                    "value": {
                      "name": "target-kubeconfig",
                      "secret": {
                        "secretName": "target-kubeconfig"
                      }
                    }
                  },
                  {
                    "op": "add",
                    "path": "/spec/template/spec/containers/0/volumeMounts/-",
                    "value": {
                      "name": "target-kubeconfig",
                      "mountPath": "/etc/radius/target-kubeconfig",
                      "readOnly": true
                    }
                  },
                  {
                    "op": "add",
                    "path": "/spec/template/spec/containers/0/env/-",
                    "value": {
                      "name": "RADIUS_TARGET_KUBECONFIG",
                      "value": "/etc/radius/target-kubeconfig/config"
                    }
                  },
                  {
                    "op": "add",
                    "path": "/spec/template/spec/containers/0/env/-",
                    "value": {
                      "name": "KUBE_CONFIG_PATH",
                      "value": "/etc/radius/target-kubeconfig/config"
                    }
                  }
                ]'

                # bicep-de is the Bicep Deployment Engine that processes recipe templates.
                # When a recipe uses 'extension kubernetes with { kubeConfig: '' }', the DE
                # resolves the Kubernetes connection. Without KUBECONFIG set, it uses in-cluster
                # config and creates resources on the k3d control plane cluster instead of the
                # target cluster. Setting KUBECONFIG makes the DE target the external cluster.
                PATCH_BICEP_DE='[
                  {
                    "op": "add",
                    "path": "/spec/template/spec/volumes/-",
                    "value": {
                      "name": "target-kubeconfig",
                      "secret": {
                        "secretName": "target-kubeconfig"
                      }
                    }
                  },
                  {
                    "op": "add",
                    "path": "/spec/template/spec/containers/0/volumeMounts/-",
                    "value": {
                      "name": "target-kubeconfig",
                      "mountPath": "/etc/radius/target-kubeconfig",
                      "readOnly": true
                    }
                  },
                  {
                    "op": "add",
                    "path": "/spec/template/spec/containers/0/env/-",
                    "value": {
                      "name": "KUBECONFIG",
                      "value": "/etc/radius/target-kubeconfig/config"
                    }
                  }
                ]'

                echo ""
                echo "--- Step 3: Patching applications-rp deployment ---"
                kubectl patch deployment applications-rp -n radius-system --type=json -p="$PATCH_APPLICATIONS_RP"
                echo "applications-rp patched"

                echo ""
                echo "--- Step 4: Patching dynamic-rp deployment ---"
                kubectl patch deployment dynamic-rp -n radius-system --type=json -p="$PATCH_DYNAMIC_RP"
                echo "dynamic-rp patched"

                echo ""
                echo "--- Step 5: Patching bicep-de deployment ---"
                kubectl patch deployment bicep-de -n radius-system --type=json -p="$PATCH_BICEP_DE"
                echo "bicep-de patched"

                echo ""
                echo "--- Step 6: Waiting for rollouts ---"
                echo "Waiting for applications-rp rollout..."
                kubectl rollout status deployment/applications-rp -n radius-system --timeout=120s
                echo "applications-rp rolled out successfully"

                echo "Waiting for dynamic-rp rollout..."
                kubectl rollout status deployment/dynamic-rp -n radius-system --timeout=120s
                echo "dynamic-rp rolled out successfully"

                echo "Waiting for bicep-de rollout..."
                kubectl rollout status deployment/bicep-de -n radius-system --timeout=120s
                echo "bicep-de rolled out successfully"

                echo ""
                echo "--- Step 7: Verifying configuration ---"
                for deploy in applications-rp dynamic-rp bicep-de; do
                  echo "$deploy env vars:"
                  kubectl get deployment $deploy -n radius-system -o jsonpath='{.spec.template.spec.containers[0].env[*].name}' && echo ""
                  echo "$deploy volume mounts:"
                  kubectl get deployment $deploy -n radius-system -o jsonpath='{.spec.template.spec.containers[0].volumeMounts[*].name}' && echo ""
                done

                echo ""
                echo "--- Step 8: Verifying kubeconfig is mounted in pods ---"
                for deploy in applications-rp dynamic-rp bicep-de; do
                  POD=$(kubectl get pod -n radius-system -l app.kubernetes.io/name=$deploy -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [ -n "$POD" ]; then
                    echo "$deploy pod ($POD):"
                    echo "  File exists: $(kubectl exec -n radius-system "$POD" -- ls -la /etc/radius/target-kubeconfig/config 2>&1)"
                    if [ "$deploy" = "bicep-de" ]; then
                      echo "  KUBECONFIG: $(kubectl exec -n radius-system "$POD" -- printenv KUBECONFIG 2>&1)"
                    else
                      echo "  RADIUS_TARGET_KUBECONFIG: $(kubectl exec -n radius-system "$POD" -- printenv RADIUS_TARGET_KUBECONFIG 2>&1)"
                      echo "  KUBE_CONFIG_PATH: $(kubectl exec -n radius-system "$POD" -- printenv KUBE_CONFIG_PATH 2>&1)"
                    fi
                  else
                    echo "WARNING: No pod found for $deploy"
                  fi
                done

                echo ""
                echo "=== External deployment target configured successfully ==="
                echo "applications-rp, dynamic-rp, and bicep-de will deploy output resources to the target cluster"
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Wait for Radius and create resource group
              run: |-
                echo "Waiting for Radius control plane to be ready..."
                for i in $(seq 1 30); do
                  if rad group create github 2>/dev/null; then
                    echo "Radius control plane is ready, resource group created."
                    exit 0
                  fi
                  echo "Waiting for Radius... ($i/30)"
                  sleep 2
                done
                echo "ERROR: Radius control plane did not become ready in time."
                exit 1
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Register resource types
              run: |-
                cd resource-types/config
                for def_file in $(yq -r '.types[].definitionLocation' types.yaml); do
                  echo "Registering resource type from $def_file..."
                  for attempt in $(seq 1 5); do
                    if rad resource-type create --from-file "$def_file" 2>&1; then
                      break
                    fi
                    if [ $attempt -eq 5 ]; then
                      echo "Failed to register $def_file after 5 attempts"
                      exit 1
                    fi
                    echo "  Retrying in 5s... ($attempt/5)"
                    sleep 5
                  done
                done
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Create environment
              run: |-
                echo "Creating Radius environment..."
                ENV_NAME="${{ inputs.environment }}"
                for i in $(seq 1 15); do
                  if rad env create "$ENV_NAME" --group github 2>&1; then
                    echo "Environment created successfully."
                    exit 0
                  fi
                  echo "Environment creation not ready, retrying in 2s... ($i/15)"
                  sleep 2
                done
                echo "ERROR: Failed to create environment after retries."
                exit 1
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Register recipes
              run: |-
                if [ -z "$RADIUS_RECIPES_MANIFEST" ]; then
                  echo "No RADIUS_RECIPES_MANIFEST configured, skipping recipe registration"
                  exit 0
                fi
                curl -fsSL "$RADIUS_RECIPES_MANIFEST" -o /tmp/recipes-manifest.yaml
                echo "Registering recipes from manifest..."
                # Iterate over top-level keys that have recipeKind (skip comment-only keys like 'recipes')
                for resource_type in $(yq e 'keys | .[]' /tmp/recipes-manifest.yaml); do
                  kind=$(yq e ".\"${resource_type}\".recipeKind // \"\"" /tmp/recipes-manifest.yaml)
                  if [ -z "$kind" ] || [ "$kind" = "null" ]; then
                    continue
                  fi
                  location=$(yq e ".\"${resource_type}\".recipeLocation" /tmp/recipes-manifest.yaml)
                  echo "  Registering $resource_type ($kind)..."
                  rad recipe register default \
                    --resource-type "$resource_type" \
                    --template-kind "$kind" \
                    --template-path "$location" \
                    --environment "/planes/radius/local/resourceGroups/github/providers/Applications.Core/environments/${{ inputs.environment }}" || echo "  Warning: Failed to register $resource_type, will use fallback"
                done
                echo "Recipe registration complete"
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
                RADIUS_RECIPES_MANIFEST: ${{ vars.RADIUS_RECIPES_MANIFEST }}
            - name: Deploy application
              run: cd app && rad deploy ${{ inputs.bicep_file }} --environment ${{ inputs.environment }} --group github
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Cleanup k3d cluster
              run: k3d cluster delete radius-ephemeral || true
              if: always()
