# Radius deployment workflow
# Generated by rad init - do not edit manually
#
# CUSTOMIZATION GUIDE:
#
# This workflow is dispatched by 'rad app delete --application <app> --environment <env>'.
#
# It destroys the specified application from the target environment.
#
# 
#
# GitHub Secrets are available in steps via ${{ secrets.SECRET_NAME }}

name: Radius app delete
run-name: Radius app delete for ${{ inputs.application }} in ${{ inputs.environment }} environment
"on":
    workflow_dispatch:
        inputs:
            application:
                description: Name of the application to delete
                required: true
                type: string
            environment:
                description: Target GitHub Environment name
                required: true
                type: string
permissions:
    actions: read
    contents: read
    id-token: write
concurrency:
    group: radius-app-delete-${{ inputs.application }}-${{ inputs.environment }}
jobs:
    delete:
        name: Delete Application
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        steps:
            - name: Checkout Radius source
              uses: actions/checkout@v4
              with:
                path: radius-src
                ref: ${{ vars.RADIUS_REF || 'main' }}
                repository: ${{ vars.RADIUS_REPO || 'radius-project/radius' }}
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                cache: "true"
                go-version-file: radius-src/go.mod
            - name: Build Radius CLI
              run: cd radius-src && go build -o /usr/local/bin/rad ./cmd/rad
            - name: Checkout application repository
              uses: actions/checkout@v4
              with:
                path: app
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-region: ${{ vars.AWS_REGION }}
                role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_IAM_ROLE_NAME }}
              if: vars.AWS_ACCOUNT_ID != ''
            - name: Azure Login
              uses: azure/login@v2
              with:
                client-id: ${{ vars.AZURE_CLIENT_ID }}
                subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
                tenant-id: ${{ vars.AZURE_TENANT_ID }}
              if: vars.AZURE_CLIENT_ID != ''
            - name: Configure target cluster kubeconfig
              run: |-
                if [ -n "$AWS_REGION" ] && [ -n "$KUBERNETES_CLUSTER" ]; then
                  echo "Configuring kubeconfig for EKS cluster: $KUBERNETES_CLUSTER"
                  aws eks update-kubeconfig --region "$AWS_REGION" --name "$KUBERNETES_CLUSTER" --kubeconfig /tmp/target-kubeconfig.yaml
                elif [ -n "$AZURE_RESOURCE_GROUP" ] && [ -n "$KUBERNETES_CLUSTER" ]; then
                  echo "Configuring kubeconfig for AKS cluster: $KUBERNETES_CLUSTER"
                  az aks get-credentials --resource-group "$AZURE_RESOURCE_GROUP" --name "$KUBERNETES_CLUSTER" --file /tmp/target-kubeconfig.yaml --overwrite-existing
                fi
              env:
                AWS_REGION: ${{ vars.AWS_REGION }}
                AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
                KUBERNETES_CLUSTER: ${{ vars.KUBERNETES_CLUSTER }}
              if: vars.KUBERNETES_CLUSTER != ''
            - name: Install k3d
              run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
            - name: Create k3d cluster
              run: k3d cluster create radius-ephemeral --volume $GITHUB_WORKSPACE/app:/github_workspace
            - name: Export kubeconfig
              run: k3d kubeconfig get radius-ephemeral > /tmp/kubeconfig.yaml
            - name: Install Radius control plane
              run: rad install kubernetes --skip-contour-install --set dashboard.enabled=false ${RADIUS_IMAGE_REGISTRY:+--set global.imageRegistry=$RADIUS_IMAGE_REGISTRY} ${RADIUS_IMAGE_TAG:+--set global.imageTag=$RADIUS_IMAGE_TAG}
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
                RADIUS_IMAGE_REGISTRY: ${{ vars.RADIUS_IMAGE_REGISTRY }}
                RADIUS_IMAGE_TAG: ${{ vars.RADIUS_IMAGE_TAG }}
            - name: Inject target cluster kubeconfig
              run: |-
                # Create Secret with target kubeconfig in k3d (radius-system namespace now exists)
                kubectl create secret generic radius-target-kubeconfig \
                  -n radius-system \
                  --from-file=kubeconfig=/tmp/target-kubeconfig.yaml \
                  --dry-run=client -o yaml | kubectl apply -f -
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
              if: vars.KUBERNETES_CLUSTER != ''
            - name: Configure Radius for target cluster
              run: |-
                echo "Patching Radius components to use target cluster kubeconfig..."
                RP_PATCH='[
                  {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"target-kubeconfig","secret":{"secretName":"radius-target-kubeconfig"}}},
                  {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"target-kubeconfig","mountPath":"/etc/radius/target-kubeconfig","readOnly":true}},
                  {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"RADIUS_TARGET_KUBECONFIG","value":"/etc/radius/target-kubeconfig/kubeconfig"}}
                ]'
                DE_PATCH='[
                  {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"target-kubeconfig","secret":{"secretName":"radius-target-kubeconfig"}}},
                  {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"target-kubeconfig","mountPath":"/etc/radius/target-kubeconfig","readOnly":true}},
                  {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"KUBECONFIG","value":"/etc/radius/target-kubeconfig/kubeconfig"}}
                ]'
                for DEPLOY in applications-rp dynamic-rp; do
                  echo "Patching $DEPLOY..."
                  kubectl patch deployment "$DEPLOY" -n radius-system --type=json -p="$RP_PATCH"
                done
                echo "Patching bicep-de..."
                kubectl patch deployment bicep-de -n radius-system --type=json -p="$DE_PATCH"
                echo "Waiting for rollouts..."
                kubectl rollout status deployment/applications-rp -n radius-system --timeout=120s
                kubectl rollout status deployment/dynamic-rp -n radius-system --timeout=120s
                kubectl rollout status deployment/bicep-de -n radius-system --timeout=120s
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
              if: vars.KUBERNETES_CLUSTER != ''
            - name: Wait for deployment engine
              run: |-
                echo "Waiting for deployment engine to be ready..."
                kubectl wait --for=condition=available deployment/bicep-de -n radius-system --timeout=120s || {
                  echo "Warning: Deployment engine pod not available, continuing anyway..."
                }
                echo "Waiting for Microsoft.Resources/deployments resource type to be registered..."
                for i in $(seq 1 30); do
                  if rad resource-type show "Microsoft.Resources/deployments" 2>/dev/null | grep -q "Microsoft.Resources/deployments"; then
                    echo "Deployment engine resource type is registered."
                    break
                  fi
                  echo "Waiting for deployment engine registration... ($i/30)"
                  sleep 4
                done
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Wait for Radius and create resource group
              run: |-
                echo "Waiting for Radius control plane to be ready..."
                for i in $(seq 1 30); do
                  if rad group create github 2>/dev/null; then
                    echo "Radius control plane is ready, resource group created."
                    exit 0
                  fi
                  echo "Waiting for Radius... ($i/30)"
                  sleep 2
                done
                echo "ERROR: Radius control plane did not become ready in time."
                exit 1
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Register resource types
              run: |-
                cd resource-types/config
                for def_file in $(yq -r '.types[].definitionLocation' types.yaml); do
                  echo "Registering resource type from $def_file..."
                  rad resource-type create --from-file "$def_file"
                done
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Create environment
              run: |-
                echo "Creating Radius environment..."
                ENV_NAME="${{ inputs.environment }}"
                for i in $(seq 1 15); do
                  if rad env create "$ENV_NAME" --group github 2>&1; then
                    echo "Environment created successfully."
                    exit 0
                  fi
                  echo "Environment creation not ready, retrying in 2s... ($i/15)"
                  sleep 2
                done
                echo "ERROR: Failed to create environment after retries."
                exit 1
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Delete application
              run: rad app delete ${{ inputs.application }} --environment ${{ inputs.environment }} --group github --yes
              env:
                KUBECONFIG: /tmp/kubeconfig.yaml
            - name: Cleanup k3d cluster
              run: k3d cluster delete radius-ephemeral || true
              if: always()
